<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goin' Bush</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            background: #f0f0f0;
            margin-left: auto;
            margin-right: auto;
            background-image: url('appicon.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        .title {
            font-size: 28px;
            font-weight: 600;
            color: black;
        }

        .subtitle {
            margin-top: 12px;
            font-size: 17px;
            color: #555;
        }

        .popup {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 350px;
            width: 300px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            font-size: 18px;
            line-height: 1.4;
            color: #333;
        }

        .popup::after {
            content: '';
            position: absolute;
            top: -10px;
            right: 10px;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 15px solid white;
        }

        .tiktok-icon {
            display: inline-block;
            width: 25px;
            height: 25px;
            background-image: url('tiktokicon.webp');
            background-size: 80%;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 50%;
            margin: 0 5px;
            vertical-align: middle;
        }

        .three-dots {
            display: inline-block;
            width: 25px;
            height: 25px;
            background: #666;
            border-radius: 50%;
            margin: 0 5px;
            position: relative;
            vertical-align: middle;
        }

        .three-dots::after {
            content: '⋯';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .highlight {
            color: rgb(0,122,255);
            font-weight: bold;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
            align-items: center;
        }

        .download-button {
            display: inline-block;
            background: rgb(0,122,255);
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,122,255,0.3);
            transition: all 0.3s ease;
        }

        .download-button:hover {
            background: rgba(0,122,255,0.9);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,122,255,0.4);
        }

        .download-button.secondary {
            background: white;
            color: rgb(0,122,255);
            border: 2px solid rgba(0,122,255,0.2);
            box-shadow: none;
        }

        .download-button.secondary:hover {
            background: rgba(0,122,255,0.05);
            box-shadow: none;
        }

        .status {
            margin-top: 18px;
            font-size: 15px;
            color: #666;
        }

        @media (max-width: 640px) {
            .container {
                padding: 32px 20px 140px;
            }

            .popup {
                top: auto;
                right: 16px;
                bottom: 16px;
                left: 16px;
                width: auto;
                max-width: none;
                padding: 22px;
                font-size: 16px;
            }

            .popup::after {
                display: none;
            }

            .download-button {
                width: 100%;
                max-width: 320px;
            }
        }

    </style>
    <script>
        const APP_STORE_URL = 'https://apps.apple.com/au/app/goin-bush/id6745422236';
        const PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=com.joshyardy.goinbush&hl=en';

        function isAndroidDevice() {
            return /Android/i.test(navigator.userAgent);
        }

        function isIOSDevice() {
            const userAgent = navigator.userAgent;
            const isIPadOS = navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1;

            return /iPhone|iPad|iPod/i.test(userAgent) || isIPadOS;
        }

        function getTargetStore() {
            if (isAndroidDevice()) {
                return {
                    name: 'Google Play',
                    url: PLAY_STORE_URL
                };
            }

            if (isIOSDevice()) {
                return {
                    name: 'the App Store',
                    url: APP_STORE_URL
                };
            }

            return null;
        }

        window.addEventListener('load', function() {
            const appStoreButton = document.getElementById('app-store-button');
            const playStoreButton = document.getElementById('play-store-button');
            const statusMessage = document.getElementById('status-message');
            const title = document.getElementById('store-title');
            const targetStore = getTargetStore();

            appStoreButton.href = APP_STORE_URL;
            playStoreButton.href = PLAY_STORE_URL;

            if (!targetStore) {
                statusMessage.textContent = 'Choose your store below.';
                return;
            }

            title.textContent = "You're being redirected to " + targetStore.name;
            statusMessage.textContent = 'If nothing happens, use the button below.';

            setTimeout(function() {
                window.location.href = targetStore.url;
            }, 1000);
        });
    </script>
</head>
<body>
    
    <div class="container">
        <div class="app-icon"></div>
        <div class="title" id="store-title">Get Goin' Bush on your device</div>
        <div class="subtitle">We’ll send you to the right app store when we can detect your device.</div>
        <div class="button-group">
            <a href="https://apps.apple.com/au/app/goin-bush/id6745422236" id="app-store-button" class="download-button">Download on the App Store</a>
            <a href="https://play.google.com/store/apps/details?id=com.joshyardy.goinbush&hl=en" id="play-store-button" class="download-button secondary">Get it on Google Play</a>
        </div>
        <div class="status" id="status-message">Checking your device…</div>
    </div>

    <div class="popup">
        On <span class="tiktok-icon"></span> you need to tap on the <span class="three-dots"></span> and then tap on <span class="highlight">"Open in browser"</span> to download the app for free.
    </div>
</body>
</html>
